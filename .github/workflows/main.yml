name: CI

on:
  release:
    types: [ created ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to build'
        required: true
        default: '0.101.2'
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  is-latest:
    name: "Is Latest"
    runs-on: ubuntu-latest
    outputs:
      nw: ${{ steps.set_nw.outputs.nw }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      - name: Check if latest
        working-directory: .github/workflows
        run: bash ./is_latest.sh ${{ github.event_name }}
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
      - name: Write NW version to env and set output
        id: set_nw
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "nw=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            NW_VERSION=$(curl -s https://nwjs.io/versions.json | jq -r '.latest' | sed 's/v//')
            echo "nw=$NW_VERSION" >> $GITHUB_OUTPUT
          fi

  build-win:
    needs: is-latest
    name: "Build for Windows on Ubuntu"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      - name: Setup build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq git build-essential nasm zip mingw-64
      - name: Build
        working-directory: ${{ github.workspace }}
        run: |
          bash ./build-linux.sh ${{ needs.is-latest.outputs.nw }} windows
          zip -9 /tmp/neff/release/${{ needs.is-latest.outputs.nw }}-windows-x64.zip /tmp/nwff/release/libffmpeg.so
      - name: Upload the artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: linux
          path: '/tmp/nwff/release/*.zip'

  build-macos:
    needs: is-latest
    name: "Build for MacOS"
    runs-on: macos-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
      - name: Delete unused SDKs
        # To free up disk space to not run out during the run
        run: |
          sudo rm -rf ~/.dotnet
          sudo rm -rf /Library/Android
          sudo rm -rf /Library/Developer/CoreSimulator
        continue-on-error: true
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      - name: npm install, build and test
        run: |
          npm install
          node build --arch x64 --version ${{ needs.is-latest.outputs.nw }}
          node build --arch arm64 --version ${{ needs.is-latest.outputs.nw }}
      - name: Upload the artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: mac
          path: 'build/out/*.zip'

  build-linux:
    needs: is-latest
    name: "Build for Linux"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      - name: Setup build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq git build-essential nasm zstd
      - name: Build
        working-directory: ${{ github.workspace }}
        run: |
          bash ./build-linux.sh ${{ needs.is-latest.outputs.nw }} linux
          zstd -19 /tmp/nwff/release/libffmpeg.so -o /tmp/nwff/release/${{ needs.is-latest.outputs.nw }}-linux-x64.so.zst
      - name: Upload the artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: linux
          path: '/tmp/nwff/release/*.so.zst'

  build-release:
    needs: [ build-win, build-macos, build-linux ]
    name: "Build Release"
    runs-on: "ubuntu-latest"
    steps:
      - name: Get NWJS version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "NW=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "NW=$(curl -s https://nwjs.io/versions | jq -r '.latest' | sed 's/v//')" >> $GITHUB_ENV
          fi

      - uses: actions/download-artifact@v4.3.0
        with:
          name: win
          path: release/win
      - uses: actions/download-artifact@v4.3.0
        with:
          name: linux
          path: release/linux
      - uses: actions/download-artifact@v4.3.0
        with:
          name: mac
          path: release/mac

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: release/

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/mac/*.zip
            release/linux/*.zst
            release/win/nwjs-ffmpeg-prebuilt/nwjs-ffmpeg-prebuilt/build/out/*.zip
          tag_name: ${{ env.NW }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
